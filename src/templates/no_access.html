{% extends "base.html" %}
{% block content %}
<div style="max-width:520px; margin:6rem auto; text-align:center;">
  <div style="font-size:2.5rem; margin-bottom:0.5rem;">🔒</div>
  <h1 style="font-family:var(--font-display); font-size:1.4rem; font-weight:700; color:var(--text);">No pages available</h1>
  <p style="color:var(--text-muted); font-size:0.9rem; margin-top:0.75rem;">
    Your role (<strong>{{ current_user.role }}</strong>) doesn't grant view access to any page yet.
    Ask an administrator to grant your role the relevant permissions.
  </p>
  <a href="/logout" class="btn btn-secondary" style="margin-top:1.5rem;">Sign out</a>
</div>
{% endblock %}
