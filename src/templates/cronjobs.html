{% extends "base.html" %}
{% block content %}
<div x-data="{ 
  modalOpen: false,
  editMode: false,
  originalName: '',
  name: '',
  pipeline: '',
  schedule: '',
  timezone: 'UTC',
  enabled: true,
  max_attempts: 3,
  delay_seconds: 60,
  
  openCreate() {
    this.editMode = false;
    this.originalName = '';
    this.name = '';
    this.pipeline = '{% if pipelines %}{{ pipelines[0].name }}{% endif %}';
    this.schedule = '0 0 * * *';
    this.timezone = 'UTC';
    this.enabled = true;
    this.max_attempts = 3;
    this.delay_seconds = 60;
    this.modalOpen = true;
  },
  openEdit(c) {
    this.editMode = true;
    this.originalName = c.name;
    this.name = c.name;
    this.pipeline = c.pipeline;
    this.schedule = c.schedule;
    this.timezone = c.timezone;
    this.enabled = c.enabled;
    this.max_attempts = c.retry.max_attempts;
    this.delay_seconds = c.retry.delay_seconds;
    this.modalOpen = true;
  }
}">
  <div class="card-header" style="margin-bottom: 2rem;">
    <div>
      <h1 class="card-title" style="font-size: 1.75rem;">Pipeline Schedules</h1>
      <p style="color:var(--text-muted); font-size:0.9rem; margin-top:0.25rem;">Automate pipeline runs using cron expressions with robust retries</p>
    </div>
    {% if 'cronjobs.create' in perms %}<button class="btn btn-primary" @click="openCreate()">+ Create Schedule</button>{% endif %}
  </div>

  <!-- Cronjobs List -->
  <div class="pipelines-grid" id="cronjobs-list">
    {% include "partials/cronjobs_list.html" %}
  </div>

  <!-- Modal -->
  <div class="modal-overlay" x-show="modalOpen" x-transition style="display:none;">
    <div class="modal-content" @click.away="modalOpen = false">
      <div class="modal-header">
        <h3 class="card-title" x-text="editMode ? 'Edit Schedule' : 'Create Schedule'"></h3>
        <button class="modal-close" @click="modalOpen = false">&times;</button>
      </div>

      <form id="cronjob-form" 
            hx-post="/api/cronjobs" 
            hx-target="#cronjobs-list" 
            hx-swap="innerHTML"
            @submit="modalOpen = false">
        
        <input type="hidden" name="original_name" x-model="originalName">

        <div class="form-group">
          <label>Schedule Name (lowercase, snake_case)</label>
          <input type="text" name="name" class="form-control" placeholder="daily_clean_events" required x-model="name" :disabled="editMode">
        </div>

        <div class="form-group">
          <label>Target Pipeline</label>
          <select name="pipeline" class="form-control" x-model="pipeline" required>
            {% for p in pipelines %}
              <option value="{{ p.name }}">{{ p.name }}</option>
            {% else %}
              <option value="">-- No pipelines configured --</option>
            {% endfor %}
          </select>
        </div>

        <div style="display:grid; grid-template-columns: 2fr 1fr; gap:1rem;">
          <div class="form-group">
            <label>Cron Expression (5-part)</label>
            <input type="text" name="schedule" class="form-control" placeholder="*/5 * * * *" required x-model="schedule" style="font-family:var(--font-mono); font-size:0.9rem;">
          </div>
          <div class="form-group">
            <label>Timezone</label>
            <select name="timezone" class="form-control" x-model="timezone">
              {% for timezone_name in timezone_options %}
              <option value="{{ timezone_name }}">{{ timezone_name }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem; margin-top:0.5rem;">
          <div class="form-group">
            <label>Max Retry Attempts</label>
            <input type="number" name="max_attempts" class="form-control" placeholder="3" required x-model="max_attempts">
          </div>
          <div class="form-group">
            <label>Retry Delay (seconds)</label>
            <input type="number" name="delay_seconds" class="form-control" placeholder="60" required x-model="delay_seconds">
          </div>
        </div>

        <div class="form-group" style="flex-direction:row; gap:0.5rem; align-items:center; margin-top:1rem;">
          <input type="checkbox" name="enabled" id="enabled-checkbox" x-model="enabled" style="width:18px; height:18px; accent-color:var(--teal-accent);">
          <label for="enabled-checkbox" style="cursor:pointer; user-select:none;">Enable this schedule immediately</label>
        </div>

        <div style="display:flex; justify-content:flex-end; gap:0.75rem; margin-top:2rem;">
          <button type="button" class="btn btn-secondary" @click="modalOpen = false">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Schedule</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
